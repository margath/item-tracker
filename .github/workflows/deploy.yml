name: Deploy Item Tracker on Commit

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  # Bumping permissions to write so the action can push commits and tags
  contents: write 
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to push tags and commits back to the repo

      - name: Inject Build Status and Commit Hash
        run: |
          VERSION="Live Build"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          sed -i "s/{{RELEASE_VERSION}}/${VERSION}/g" index.html
          sed -i "s/{{COMMIT_HASH}}/${{ github.sha }}/g" index.html
          sed -i "s/{{SHORT_SHA}}/${SHORT_SHA}/g" index.html

      - name: Commit and Push Tag
        run: |
          # Configure the git bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit the modified index.html so the tag points to the injected version
          git add index.html
          
          # Only commit if there are changes (prevents failure if nothing changed)
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: inject build hashes [skip ci]"
          
          # Create and push a unique tag for this build
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          NEW_TAG="build-${SHORT_SHA}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
