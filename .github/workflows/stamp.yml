name: Stamp Build Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  stamp-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Stamp, Commit, and Tag
        run: |
          # 1. Generate Variables
          VERSION="$(date -u +'%Y.%m.%d').${{ github.run_number }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          REPO_PATH="${{ github.repository }}"
          
          # 2. Inject into HTML
          sed -i "s/{{RELEASE_VERSION}}/${VERSION}/g" index.html
          sed -i "s/{{COMMIT_HASH}}/${{ github.sha }}/g" index.html
          sed -i "s/{{SHORT_SHA}}/${SHORT_SHA}/g" index.html
          sed -i "s|YOUR_USERNAME/YOUR_REPO|${REPO_PATH}|g" index.html

          # 3. Configure Git Bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. Commit to Main
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: stamp version ${VERSION} [skip ci]"
          git push origin main
          
          # 5. Create and Push Tag (Now VERSION is successfully stored in memory!)
          NEW_TAG="v${VERSION}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
