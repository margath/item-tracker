name: Stamp Build Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  stamp-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Inject Version and Repository Data
        run: |
          VERSION="$(date -u +'%Y.%m.%d').${{ github.run_number }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          REPO_PATH="${{ github.repository }}"
          
          # This Regex looks for the exact property names and overwrites ANY text inside their quotes.
          # It guarantees the script works perfectly every single time it runs!
          sed -i -E 's/version: "[^"]*"/version: "v'"${VERSION}"'"/' index.html
          sed -i -E 's/commit: "[^"]*"/commit: "'"${GITHUB_SHA}"'"/' index.html
          sed -i -E 's/shortSha: "[^"]*"/shortSha: "'"${SHORT_SHA}"'"/' index.html
          sed -i -E 's|repo: "[^"]*"|repo: "'"${REPO_PATH}"'"|' index.html

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add index.html
          
          # Commit the changes (Skipping CI prevents an infinite loop)
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: stamp version v${VERSION} [skip ci]"
          git push origin main
          
          # Create and Push Tag
          NEW_TAG="v${VERSION}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
