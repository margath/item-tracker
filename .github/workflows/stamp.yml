name: Stamp Build Version

on:
  push:
    branches:
      - main
    paths:
      # - '**.html'        # Triggers on ANY HTML file change in the repo
      # Alternatively, you can be hyper-specific:
      - 'index.html'
      - 'beta/index.html'
      
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  stamp-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Stamp, Commit, and Tag
        run: |
          # 1. Generate Variables
          VERSION="$(date -u +'%Y.%m.%d').${{ github.run_number }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          REPO_PATH="${{ github.repository }}"
          
          # 2. Safely replace the BUILD_INFO block using explicit markers
          awk -v v="${VERSION}" -v c="${GITHUB_SHA}" -v s="${SHORT_SHA}" -v r="${REPO_PATH}" '
            /\/\/ --- BUILD INFO START ---/ {
              print
              print "        const BUILD_INFO = {"
              print "            version: \"" v "\","
              print "            commit: \"" c "\","
              print "            shortSha: \"" s "\","
              print "            repo: \"" r "\""
              print "        };"
              print "        const GITHUB_REPO = \"" r "\";"
              skip=1
              next
            }
            /\/\/ --- BUILD INFO END ---/ {
              skip=0
            }
            !skip { print }
          ' index.html > temp.html && mv temp.html index.html

          # 3. Configure Git Bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. Commit to Main
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: stamp version v${VERSION} [skip ci]"
          git push origin main
          
          # 5. Create and Push Tag Safely
          NEW_TAG="v${VERSION}"
          
          # Check if the tag already exists on the remote to prevent retry failures
          if git ls-remote --tags origin | grep -q "refs/tags/$NEW_TAG"; then
            echo "Tag $NEW_TAG already exists, skipping tag creation."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi
